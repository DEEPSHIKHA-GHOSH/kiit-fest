<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>KIITFest – Access Pass</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#F4547A;
  --pink-lt:#FDDDE6;
  --text:#111111;
  --sub:#999999;
  --border:#E4E4E8;
}
html,body{
  font-family:'Barlow',sans-serif;
  background:#F0F0F0;
  min-height:100vh;
}
.page{
  width:100%;
  max-width:420px;
  margin:0 auto;
  background:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ── HEADER ── */
.header-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:24px 20px 20px;
}
.header-left{display:flex;align-items:center;gap:14px;}
.shield-box{
  width:54px;height:54px;
  background:var(--pink-lt);
  border-radius:15px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.header-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:32px;
  font-weight:900;
  color:var(--text);
  letter-spacing:0.04em;
  line-height:1;
  text-transform:uppercase;
}
.header-sub{
  font-size:9px;
  letter-spacing:0.20em;
  color:var(--sub);
  margin-top:5px;
  text-transform:uppercase;
  font-weight:500;
}
.close-btn{
  width:38px;height:38px;
  background:#111;
  border-radius:50%;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:0;}

/* ── TABS ── */
.tabs-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:20px 20px 16px;
}
.tab-group{
  flex:1;
  background:#EFEFEF;
  border-radius:50px;
  padding:5px;
  display:flex;
}
.tab{
  flex:1;text-align:center;
  padding:10px 0;
  border-radius:50px;
  font-size:13px;
  font-weight:700;
  letter-spacing:0.10em;
  cursor:pointer;
  border:none;
  text-transform:uppercase;
  font-family:'Barlow',sans-serif;
  transition:background .15s,color .15s;
}
.tab.active{background:var(--pink);color:#fff;}
.tab.inactive{background:transparent;color:var(--sub);}
.refresh-btn{
  width:42px;height:42px;
  border-radius:50%;
  background:#EFEFEF;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

/* ── QR CARD ── */
.qr-outer{padding:0 20px;margin-bottom:28px;}
.qr-card{
  border:5px solid #111;
  border-radius:30px;
  padding:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
}
/* Perfect square QR canvas */
#qrCanvas{
  display:block;
  width:260px;
  height:260px;
  image-rendering:pixelated;
}
.bar-inner{width:100%;}
#barCanvas{display:block;width:100%;height:90px;}

/* ── ENTRY PROTOCOLS ── */
.protocols{padding:0 20px;}
.section-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;
  font-weight:900;
  color:var(--pink);
  letter-spacing:0.12em;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:5px;
}
.section-title::after{
  content:'';flex:1;height:1px;background:var(--border);
}
.section-sub{
  font-size:9px;
  letter-spacing:0.17em;
  color:var(--sub);
  text-transform:uppercase;
  font-weight:500;
  margin-bottom:14px;
}
.checklist-item{
  background:#F7F7F9;
  border-radius:16px;
  padding:16px;
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:10px;
}
.ci-icon{
  width:46px;height:46px;
  background:#fff;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.checklist-item p{font-size:14px;color:var(--text);line-height:1.5;font-weight:400;}
.checklist-item p strong{font-weight:700;}

/* ── FOOTER ── */
.footer{
  text-align:center;
  padding:20px 20px 12px;
  margin-top:auto;
}
.footer .time-line{
  color:var(--pink);
  font-size:16px;
  font-weight:600;
  letter-spacing:0.05em;
  display:flex;align-items:center;justify-content:center;gap:7px;
  margin-bottom:9px;
}
.footer .id-line{
  font-size:9px;
  letter-spacing:0.16em;
  color:var(--sub);
  text-transform:uppercase;
  font-weight:500;
}

/* ── NAV BAR ── */
.navbar{
  background:#fff;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:10px 0 18px;
  margin-top:auto;
}
.nav-btn{
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  width:46px;height:44px;position:relative;
}
.nav-badge{position:relative;display:inline-flex;}
.badge{
  position:absolute;top:-3px;right:-7px;
  background:var(--pink);color:#fff;
  font-size:9px;font-weight:800;
  width:15px;height:15px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.home-bar{
  width:130px;height:4px;
  background:#111;border-radius:10px;
  margin:2px auto 10px;
}
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header-row">
    <div class="header-left">
      <div class="shield-box">
        <svg width="28" height="30" viewBox="0 0 28 30" fill="none">
          <path d="M14 1.5L2.5 6.5V14C2.5 20.8 7.6 27 14 28.5C20.4 27 25.5 20.8 25.5 14V6.5L14 1.5Z"
            fill="#F4547A" opacity=".20" stroke="#F4547A" stroke-width="1.6"/>
          <path d="M9.5 15L13 18.5L18.5 12" stroke="#F4547A" stroke-width="2.4"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="header-title">Access Granted</div>
        <div class="header-sub">Verified Security Clearance</div>
      </div>
    </div>
    <button class="close-btn">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
        <line x1="1.5" y1="1.5" x2="12.5" y2="12.5" stroke="white" stroke-width="2.3" stroke-linecap="round"/>
        <line x1="12.5" y1="1.5" x2="1.5" y2="12.5" stroke="white" stroke-width="2.3" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- DIVIDER -->
  <div class="divider"></div>

  <!-- TABS -->
  <div class="tabs-row">
    <div class="tab-group">
      <button class="tab active" id="tab-qr" onclick="switchTab('qr')">QR</button>
      <button class="tab inactive" id="tab-bar" onclick="switchTab('bar')">Bar</button>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshQR()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666"
        stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
  </div>

  <!-- QR PANEL -->
  <div class="qr-outer" id="qr-panel">
    <div class="qr-card">
      <canvas id="qrCanvas" width="260" height="260"></canvas>
    </div>
  </div>

  <!-- BAR PANEL -->
  <div class="qr-outer" id="bar-panel" style="display:none;">
    <div class="qr-card" style="border-radius:20px;">
      <div class="bar-inner">
        <canvas id="barCanvas" width="300" height="90"></canvas>
      </div>
    </div>
  </div>

  <!-- ENTRY PROTOCOLS -->
  <div class="protocols">
    <div class="section-title">Entry Protocols</div>
    <div class="section-sub">Security Clearance Checklist</div>

    <div class="checklist-item">
      <div class="ci-icon">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <rect x="1" y="1" width="9" height="9" rx="1.2" stroke="#333" stroke-width="1.6"/>
          <rect x="3.2" y="3.2" width="4.6" height="4.6" fill="#333" rx=".4"/>
          <rect x="16" y="1" width="9" height="9" rx="1.2" stroke="#333" stroke-width="1.6"/>
          <rect x="18.2" y="3.2" width="4.6" height="4.6" fill="#333" rx=".4"/>
          <rect x="1" y="16" width="9" height="9" rx="1.2" stroke="#333" stroke-width="1.6"/>
          <rect x="3.2" y="18.2" width="4.6" height="4.6" fill="#333" rx=".4"/>
          <rect x="16" y="16" width="4" height="4" fill="#333" rx=".3"/>
          <rect x="22" y="16" width="3" height="3" fill="#333" rx=".3"/>
          <rect x="16" y="22" width="3" height="3" fill="#333" rx=".3"/>
          <rect x="20.5" y="20.5" width="4.5" height="4.5" fill="#333" rx=".3"/>
        </svg>
      </div>
      <p><strong>Digital QR Pass:</strong> Scan this pass mandatory at gate.</p>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="time-line">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
        stroke="#F4547A" stroke-width="2.2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <span id="clock">09:48:24 AM</span>
    </div>
    <div class="id-line">ID: KF68156470 &nbsp;|&nbsp; Secure Access Protocol</div>
  </div>

  <!-- NAV BAR -->
  <div class="navbar">
    <button class="nav-btn">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="#333"
        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </button>
    <button class="nav-btn">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="#333"
        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
    <button class="nav-btn">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="#333"
        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
    <button class="nav-btn">
      <div class="nav-badge">
        <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="#333"
          stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
        <span class="badge">4</span>
      </div>
    </button>
    <button class="nav-btn">
      <svg width="5" height="21" viewBox="0 0 5 21" fill="#333">
        <circle cx="2.5" cy="2.5" r="2.5"/>
        <circle cx="2.5" cy="10.5" r="2.5"/>
        <circle cx="2.5" cy="18.5" r="2.5"/>
      </svg>
    </button>
  </div>
  <div class="home-bar"></div>

</div><!-- end .page -->

/* ── IST Clock (Kolkata UTC+5:30) ── */
function tickIST() {
  // Get current UTC time, add 5h30m for IST
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const ist = new Date(utc + 5.5 * 3600000);

  let h = ist.getHours();
  const m = ist.getMinutes();
  const s = ist.getSeconds();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('clock').textContent =
    pad(h) + ':' + pad(m) + ':' + pad(s) + ' ' + ap;
}
setInterval(tickIST, 1000);
tickIST();

/* ── QR Code ── */
function drawQR(text) {
  const canvas = document.getElementById('qrCanvas');
  // Force exact square
  canvas.width = 260;
  canvas.height = 260;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 260, 260);

  const tmp = document.createElement('div');
  tmp.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
  document.body.appendChild(tmp);

  new QRCode(tmp, {
    text: text || 'https://kiitfest.org/pass/KF68156470',
    width: 260,
    height: 260,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });

  setTimeout(() => {
    const src = tmp.querySelector('canvas');
    if (src) {
      // Draw QR as a perfect 260x260 square
      ctx.drawImage(src, 0, 0, 260, 260);
      overlayLogo(ctx, 260);
    }
    document.body.removeChild(tmp);
  }, 200);
}

function overlayLogo(ctx, size) {
  const cx = size / 2, cy = size / 2;
  const logoSize = 46;
  const pad = 7;

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, logoSize / 2 + pad, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.restore();

  const img = new Image();
  img.onload = () => {
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, logoSize / 2, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(img, cx - logoSize/2, cy - logoSize/2, logoSize, logoSize);
    ctx.restore();
  };
  img.src = 'data:image/png;base64,' + LOGO_B64;
}

/* ── Barcode ── */
function drawBarcode() {
  const canvas = document.getElementById('barCanvas');
  const w = canvas.offsetWidth || 300;
  const h = 90;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,w,h);
  const data = 'KF68156470';
  let bits = [1,0,1,0];
  for (let i=0;i<data.length;i++){
    const c = data.charCodeAt(i);
    for(let b=7;b>=0;b--) bits.push((c>>b)&1);
    bits.push(0);
  }
  bits.push(1,0,1);
  const bw = (w-36)/bits.length;
  let x=18;
  bits.forEach(bit => {
    if(bit){ ctx.fillStyle='#000'; ctx.fillRect(Math.round(x),6,Math.max(1,Math.ceil(bw*.65)),h-22); }
    x+=bw;
  });
  ctx.fillStyle='#555'; ctx.font='600 11px Barlow,sans-serif';
  ctx.textAlign='center'; ctx.fillText('KF68156470',w/2,h-4);
}

/* ── Tab switch ── */
function switchTab(tab) {
  document.getElementById('tab-qr').className  = 'tab '+(tab==='qr' ?'active':'inactive');
  document.getElementById('tab-bar').className = 'tab '+(tab==='bar'?'active':'inactive');
  document.getElementById('qr-panel').style.display  = tab==='qr' ?'block':'none';
  document.getElementById('bar-panel').style.display = tab==='bar'?'block':'none';
  if(tab==='bar') drawBarcode();
}

function refreshQR() {
  const btn = document.getElementById('refreshBtn');
  btn.style.transition='transform 0.4s ease';
  btn.style.transform='rotate(360deg)';
  setTimeout(()=>{ btn.style.transform=''; btn.style.transition=''; },420);
  drawQR('https://kiitfest.org/pass/KF68156470?t='+Date.now());
}

window.addEventListener('load', ()=>{ drawQR(); });
</script>
